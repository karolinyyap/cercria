<div class="sidebar" [class.aberta]="sidebarService.aberta()">
  <!-- INÍCIO -->
  <div class="menu-item" routerLink="/home" routerLinkActive="ativo">
    <img src="/assets/home.png" />
    <span>Início</span>
  </div>

  <!-- FUNCIONÁRIOS -->
  <div class="menu-item" (click)="toggleMenu('funcionario')">
    <img src="/assets/funcionario.png" />
    <span>Funcionários</span>
    <span class="seta" [class.aberta]="menuAberto === 'funcionario'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'funcionario'">
    <div routerLink="/funcionario/cadastro" routerLinkActive="ativo" class="submenu-item">
      Cadastro
    </div>
    <div routerLink="/funcionario/listagem" routerLinkActive="ativo" class="submenu-item">
      Listagem
    </div>
  </div>

  <!-- ACOLHIDOS -->
  <div class="menu-item" (click)="toggleMenu('acolhido')">
    <img src="/assets/acolhidos.png" />
    <span>Acolhidos</span>
    <span class="seta" [class.aberta]="menuAberto === 'acolhido'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'acolhido'">
    <div routerLink="/acolhido/cadastro" routerLinkActive="ativo" class="submenu-item">
      Cadastro
    </div>
    <div routerLink="/acolhido/listagem" routerLinkActive="ativo" class="submenu-item">
      Listagem
    </div>
  </div>

  <!-- MEDICAMENTOS -->
  <div class="menu-item" (click)="toggleMenu('medicamento')">
    <img src="/assets/medicamento.png" />
    <span>Medicamentos</span>
    <span class="seta" [class.aberta]="menuAberto === 'medicamento'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'medicamento'">
    <div routerLink="/medicamento/cadastro" class="submenu-item">Cadastro</div>
    <div routerLink="/medicamento/listagem" class="submenu-item">Listagem</div>
  </div>

  <!-- PRODUTOS -->
  <div class="menu-item" (click)="toggleMenu('produto')">
    <img src="/assets/produto.png" />
    <span>Produtos</span>
    <span class="seta" [class.aberta]="menuAberto === 'produto'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'produto'">
    <div routerLink="/produto/cadastro" class="submenu-item">Cadastro</div>
    <div routerLink="/produto/listagem" class="submenu-item">Listagem</div>
    <div routerLink="/produto/controle" class="submenu-item">Controle</div>
  </div>

  <!-- PATRIMÔNIO -->
  <div class="menu-item" (click)="toggleMenu('patrimonio')">
    <img src="/assets/patrimonio.png" />
    <span>Patrimônio</span>
    <span class="seta" [class.aberta]="menuAberto === 'patrimonio'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'patrimonio'">
    <div routerLink="/patrimonio/cadastro" class="submenu-item">Cadastro</div>
    <div routerLink="/patrimonio/listagem" class="submenu-item">Listagem</div>
  </div>

  <!-- AGENDA -->
  <div class="menu-item" (click)="toggleMenu('agenda')">
    <img src="/assets/calendario.png" />
    <span>Agenda</span>
    <span class="seta" [class.aberta]="menuAberto === 'agenda'">▼</span>
  </div>

  <div class="submenu" [class.aberto]="menuAberto === 'agenda'">
    <div routerLink="/agenda/listagem" class="submenu-item">Calendário</div>
    <div routerLink="/agenda/evento-cadastro" class="submenu-item">Novo Evento</div>
  </div>

  <!-- RELATÓRIOS -->
  <div class="menu-item" (click)="toggleMenu('agenda')">
    <img src="/assets/relatorio.png" />
    <span>Relatórios</span>
  </div>
</div>
