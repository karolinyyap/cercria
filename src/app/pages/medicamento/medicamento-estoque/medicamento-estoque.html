<app-header></app-header>
<div class="main-container">
  <app-sidebar></app-sidebar>
  <div class="page-content">
    <nav class="breadcrumb">
      <a routerLink="/home">Home</a>
      <span class="breadcrumb-span">/</span>
      <a routerLink="/medicamento/listagem">Listagem de Medicamentos</a>
      <span class="breadcrumb-span">/</span>
      <span>Estoque de {{ medicamento.nome }}</span>
    </nav>

    <div class="med-header">
      @if (medicamento; as m) {
        <div>
          <h2>{{ m.nome }}</h2>
          <span class="badge-categoria">{{ m.categoria }}</span>
        </div>
      }
      <a routerLink="/medicamento/listagem" class="btn-voltar">← Voltar</a>
    </div>

    <div class="content-row">
      <!-- CARD -->
      <div class="cards-row">
        <div class="metric-card">
          <div class="metric-label">Estoque atual</div>
          <div class="metric-val atual">{{ estoqueAtual }}</div>
          <div class="metric-unit">{{ medicamento.unidadeMedida }}</div>
        </div>
      </div>

      <!-- PAINEL -->
      <div class="panel">
        <div class="panel-body">
          <div class="section-title">Registrar nova entrada</div>

          <form #formEntrada="ngForm" (ngSubmit)="salvarEntrada()" class="form-grid">
            <div class="campo">
              <label>Quantidade <span>*</span></label>
              <input
                type="number"
                name="quantidade"
                required
                min="1"
                [(ngModel)]="novaEntrada.quantidade"
              />
            </div>

            <div class="campo">
              <label>Data de entrada <span>*</span></label>
              <input
                type="date"
                name="dataEntrada"
                required
                [(ngModel)]="novaEntrada.dataEntrada"
              />
            </div>

            <div class="campo">
              <label>Data de validade <span>*</span></label>
              <input
                type="date"
                name="dataValidade"
                required
                [(ngModel)]="novaEntrada.dataValidade"
              />
            </div>

            <div class="campo">
              <label>Origem <span>*</span></label>
              <select name="origem" required [(ngModel)]="novaEntrada.origem">
                <option value="">Selecione</option>
                <option value="Prefeitura">Prefeitura</option>
                <option value="Farmácia popular">Farmácia popular</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-limpar" (click)="limparFormEntrada()">Limpar</button>
              <button type="submit" class="btn" [disabled]="formEntrada.invalid">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
